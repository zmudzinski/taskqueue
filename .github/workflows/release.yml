# ============================================================================
# ============================================================================
# TaskQueue – Release Pipeline  (100% free, no Apple Developer account)
# ============================================================================
# Triggered automatically when `npm run release` pushes a tag like v1.2.3
#
# What this does:
#   • Builds a macOS Universal binary (arm64 + x86_64) on a free GitHub runner
#   • Signs the update artifacts with a Tauri keypair (free, just crypto)
#   • Creates a GitHub Release and uploads:
#       - TaskQueue_x.y.z_universal.dmg   ← installer for users
#       - TaskQueue.app.tar.gz + .sig     ← used by the auto-updater
#       - latest.json                     ← update manifest endpoint
#
# The DMG is NOT Apple-notarized (that requires a paid Apple Developer account).
# First install on another Mac: right-click the app → Open → Open (one-time).
# Or run: xattr -dr com.apple.quarantine /Applications/TaskQueue.app
#
# ── Required GitHub Secrets (Settings → Secrets → Actions) ──────────────────
#
#  TAURI_SIGNING_PRIVATE_KEY          Updater signing private key (free to generate)
#  TAURI_SIGNING_PRIVATE_KEY_PASSWORD Password for the key (can be empty string)
#
#  Generate once locally:
#    npx tauri signer generate -w .tauri/taskqueue.key
#  Copy the printed public key → src-tauri/tauri.conf.json → plugins.updater.pubkey
#  Add the private key file contents as the TAURI_SIGNING_PRIVATE_KEY secret.
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-macos:
    name: Build & Release (macOS Universal)
    runs-on: macos-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      # ── toolchains ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable + universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # ── deps ──────────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── build + publish ───────────────────────────────────────────────────
      - name: Build & publish with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TaskQueue ${{ github.ref_name }}
          releaseBody: |
            ## What's new
            <!-- describe changes here -->

            ### Installation (first launch on a new Mac)
            1. Download **TaskQueue_*_universal.dmg** below and open it
            2. If macOS blocks the app, use one of the methods below:
               - Finder: **right-click the app icon -> Open -> Open**
               - System Settings: **Privacy & Security -> Open Anyway**
               - Terminal:
                 xattr -dr com.apple.quarantine /Applications/TaskQueue.app
              *(one-time only - next launches work normally)*

            ### Updates
            If you already have a previous version installed, the app will notify you automatically.
          releaseDraft: false
          # Keep this false so /releases/latest/download/latest.json always points to the newest release.
          # GitHub's "latest" endpoint ignores prereleases.
          prerelease: false
          args: --target universal-apple-darwin
